<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Config</title>
<link rel="stylesheet" href="/admin/assets/admin.css">
</head>
<body>
<div class="container">
  <h1>Admin Config <span id="dirty-badge" class="badge badge-ok" style="display:none">Unsaved changes</span></h1>
  <div id="status">Loading...</div>
  <div id="restart-notice" style="display:none"></div>

  <div class="section">
    <div class="section-header">Overview</div>
    <div class="section-body">
      <div class="field-group"><label>Runtime Version</label><input id="ov-version" readonly></div>
      <div class="field-group"><label>Restart Required Fields</label><input id="ov-restart" readonly></div>
      <div id="ov-instance-info"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-header">Providers</div>
    <div class="section-body">
      <h3 style="margin:0 0 0.5rem;font-size:0.95rem">Primary Provider (env)</h3>
      <table id="primary-table"><thead><tr><th>Key</th><th>Value</th><th>Secret</th></tr></thead><tbody></tbody></table>
      <h3 style="margin:1rem 0 0.5rem;font-size:0.95rem">Fallback Providers</h3>
      <table id="fallback-table"><thead><tr><th>Move</th><th>Name</th><th>Base URL</th><th>Key Mode</th><th>Key Env</th><th>Configured</th><th>Actions</th></tr></thead><tbody></tbody></table>
    </div>
  </div>

  <div class="section">
    <div class="section-header">Model Mappings</div>
    <div class="section-body">
      <div id="model-mappings-list"></div>
      <div class="btn-row" style="margin-top:0.5rem">
        <button id="btn-add-mapping">+ Add Mapping</button>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-header">Runtime / Compatibility</div>
    <div class="section-body">
      <table id="runtime-table"><thead><tr><th>Key</th><th>Value</th></tr></thead><tbody></tbody></table>
    </div>
  </div>

  <div class="section">
    <div class="section-header">Review &amp; Apply</div>
    <div class="section-body">
      <div id="validation-result"></div>
      <div class="btn-row">
        <button id="btn-validate" class="primary">Validate</button>
        <button id="btn-save" class="primary">Save</button>
        <button id="btn-reload" class="warning">Reload</button>
        <button id="btn-rollback" class="danger">Rollback</button>
      </div>
      <div id="action-result"></div>
    </div>
  </div>
</div>
<script src="/admin/assets/admin.js"></script>
</body>
</html>
